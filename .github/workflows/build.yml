name: CI/CD - Build and Deploy

on:
  push:
    branches: ["**"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      repo_lc: ${{ steps.set_repo.outputs.repo_lc }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lowercase repo name
        id: set_repo
        run: |
          echo "repo_lc=${GITHUB_REPOSITORY,,}" >> ${GITHUB_OUTPUT}
          echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: ${{ github.ref_name == 'main' }}
          tags: ghcr.io/${{ env.REPO_LC }}/backend:latest

      - name: Build and Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: ${{ github.ref_name == 'main' }}
          tags: ghcr.io/${{ env.REPO_LC }}/frontend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref_name == 'main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_IP }} >> ~/.ssh/known_hosts

      - name: Install Ansible
        run: sudo apt-get update && sudo apt-get install -y ansible

      - name: Run Setup (Infrastructure)
        run: |
          ansible-playbook -i hosts.ini setup.yml \
          -e "ansible_port=${{ secrets.SSH_PORT }}" \
          -e "ansible_host=${{ secrets.SSH_IP }}" \
          -e "ansible_user=${{ secrets.SSH_USER }}"

      - name: Copy docker-compose to server
        run: |
          scp -P ${{ secrets.SSH_PORT }} docker-compose.yml ${{ secrets.SSH_USER }}@${{ secrets.SSH_IP }}:/opt/infra/docker-compose.yml

      - name: Deploy Containers
        run: |
          ssh -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_IP }} "
            cd /opt/infra && \
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin && \
            
            export DB_USER='${{ secrets.DB_USER }}' && \
            export DB_PASSWORD='${{ secrets.DB_PASSWORD }}' && \
            export DB_NAME='${{ secrets.DB_NAME }}' && \
            export PGADMIN_EMAIL='${{ secrets.PGADMIN_EMAIL }}' && \
            export PGADMIN_PASSWORD='${{ secrets.PGADMIN_PASSWORD }}' && \
            export LOGTO_CLIENT_ID='${{ secrets.LOGTO_CLIENT_ID }}' && \
            export LOGTO_CLIENT_SECRET='${{ secrets.LOGTO_CLIENT_SECRET }}' && \
            export LOGTO_ISSUER='${{ secrets.LOGTO_ISSUER }}' && \
            export LOGTO_REDIRECT_URI='${{ secrets.LOGTO_REDIRECT_URI }}' && \
            
            docker compose pull && \
            docker compose up -d --remove-orphans
          "
